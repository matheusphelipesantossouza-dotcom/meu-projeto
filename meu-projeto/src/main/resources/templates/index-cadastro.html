<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário | Meu Projeto</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="page-wrapper">
        <section class="card">
            <div class="card-header">
                <span class="eyebrow">Cadastro de Usuário</span>
                <h1>Registre um novo usuário</h1>
                <p>Preencha os dados para criar um acesso seguro e profissional.</p>
            </div>
            <form action="/cadastro" method="post" class="form-grid">
                <div class="field-group">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
                </div>
                <div class="field-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                </div>
                <div class="field-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="seu@exemplo.com" required>
                </div>
                <div class="field-group">
                    <label for="cargo">Cargo</label>
                    <input type="text" id="cargo" name="cargo" placeholder="Ex: Desenvolvedor" required>
                </div>
                <div class="field-group">
                    <label for="username">Login</label>
                    <input type="text" id="username" name="username" placeholder="Nome de usuário" required>
                </div>
                <div class="field-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                </div>
                <div class="field-group">
                    <label for="role">Perfil de acesso</label>
                    <select id="role" name="role" required>
                        <option value="">Selecione...</option>
                        <option value="admin">Administrador</option>
                        <option value="gerente">Gerente</option>
                        <option value="colaborador">Colaborador</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" href="/cadastrar">Cadastrar</button>
                    <a class="secondary-button" href="/login">Ir para login</a>
                </div>
            </form>
        </section>
    </div>
</body>
</html>
